# INPUTS:
# ===================================================
# tag: The Git tag to create (e.g. v1.0.0)
# version: The version string (e.g. 1.0.0)
# ===================================================

# OUTPUTS:
# ===================================================
# The YouTubeExtended deb file will be available as a release in the GitHub repository.
# ===================================================

name: Tag and Release
description: Creates and validates the tag and creates a release on GitHub

inputs:
  tag:
    description: The Git tag to create (e.g. v1.0.0)
    required: true
    type: string
  version:
    description: The version string (e.g. 1.0.0)
    required: true
    type: string

runs:
  using: composite
  steps:
    - name: Check if tag already exists
      shell: bash
      run: |
        set -e
        git fetch --tags
        if git rev-parse "${{ inputs.tag }}" >/dev/null 2>&1; then
          echo "::error::Tag ${{ inputs.tag }} already exists. Aborting release."
          exit 1
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.tag }}
        name: YouTubeExtended ${{ inputs.version }}
        files: "*.deb"
        fail_on_unmatched_files: true
        generate_release_notes: true
