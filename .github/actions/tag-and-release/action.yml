  name: Tag and Release
  description: Creates and validates the tag and creates a release on GitHub

  inputs:
    tag:
      description: The Git tag to create (e.g. v1.0.0)
      required: true
      type: string

  runs:
    using: composite
    steps:
      - name: Check if tag already exists
        shell: bash
        run: |
          set -e
          git fetch --tags
          if git rev-parse "${{ inputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ inputs.tag }} already exists. Aborting release."
            exit 1
          fi

      - name: Strip tag prefix
        id: version
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          echo "value=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: YouTubeExtended ${{ steps.version.outputs.value }}
          files: *.deb
          fail_on_unmatched_files: true
          generate_release_notes: true
