# .github/actions/download-build/action.yml
name: Download existing build from GitHub Releases
description: Downloads a specific YouTubeExtended release deb and re-uploads it as artifact

inputs:
  tweak_version:
    description: Version to download (e.g. 1.0.0)
    required: true

runs:
  using: composite
  steps:
    - name: Download deb from GitHub Releases
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -e
        tag="v${{ inputs.tweak_version }}"
        echo "Downloading release assets for tag $tag..."

        gh release download "$tag" \
          --repo "${{ github.repository }}" \
          --pattern "*.deb" \
          --dir "${{ github.workspace }}"

        deb=$(ls "${{ github.workspace }}"/*.deb 2>/dev/null | head -n 1)
        if [ -z "$deb" ]; then
          echo "::error::No .deb file found in release $tag."
          exit 1
        fi
        echo "Downloaded: $deb"

    - name: Upload YouTubeExtended in the current workflow run
      uses: actions/upload-artifact@v4
      with:
        name: youtubeextended
        path: ${{ github.workspace }}/*.deb
        if-no-files-found: error
        retention-days: 1
