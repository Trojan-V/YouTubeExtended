# OUTPUTS:
# ===================================================
# version: The version string (e.g. 1.0.0)
# tag: The version as Git tag (e.g. v1.0.0)
# ---------------------------------------------------
# To use these outputs in the caller workflow, you can reference them as follows:
# - name: Get tweak version
#   id: version
#   uses: ./.github/actions/get-tweak-version

# - name: Use version
#   run: |
#     echo "Version is ${{ steps.version.outputs.version }}"
#     echo "Tag is ${{ steps.version.outputs.tag }}"
# ===================================================

name: Get tweak version from control file
description: Reads the version from the YouTubeExtended control file and exposes it as output

outputs:
  version:
    description: The version string (e.g. 1.0.0)
    value: ${{ steps.parse.outputs.version }}
  tag:
    description: The version as Git tag (e.g. v1.0.0)
    value: ${{ steps.parse.outputs.tag }}

runs:
  using: composite
  steps:
    - name: Parse version
      id: parse  # The ID is required to be able to reference this step in the "outputs" section above.
      shell: bash
      run: |
        set -e
        version=$(sed -n 's/^Version:[[:space:]]*//p' control | head -n 1 | tr -d '\r')
        if [ -z "$version" ]; then
          echo "::error::Could not read Version from control file."
          exit 1
        fi
        echo "version=$version" >> "$GITHUB_OUTPUT"
        echo "tag=v$version" >> "$GITHUB_OUTPUT"
