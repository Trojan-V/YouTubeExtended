name: Build YouTubeExtended (Reusable Workflow)

on:
  workflow_call:
    outputs:
      tweak-version:
        description: "The version number of the built tweak, read from the control file"
        value: ${{ jobs.get-version-number.outputs.tweak-version }}

jobs:
  # =================== DEPENDENCIES ===================
  theos-cache:
    name: Cache Theos
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache.outputs.cache-key }}
    steps:
      - name: Compute Theos cache key
        id: cache
        shell: bash
        run: |
          echo "cache-key=theos-${{ runner.os }}-$(git ls-remote https://github.com/theos/theos HEAD | cut -f1)-$(git ls-remote https://github.com/theos/sdks HEAD | cut -f1)" >> "$GITHUB_OUTPUT"

  checkout:
    name: Checkout source code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

  get-version-number:
    name: Get tweak version number
    runs-on: ubuntu-latest
    needs: checkout
    outputs:
      tweak-version: ${{ steps.version.outputs.version }}
    steps:
      - name: Read version from control file
        id: version
        shell: bash
        run: |
          set -e
          version=$(sed -n 's/^Version:[[:space:]]*//p' control | head -n 1 | tr -d '\r')
          if [ -z "$version" ]; then
            echo "::error::Could not read Version from control file."
            exit 1
          fi
          echo "tweak-version=$version" >> "$GITHUB_OUTPUT"

  # ====================================================

  build:
    name: Build YouTubeExtended tweak
    runs-on: macos-latest
    needs: [checkout, theos-cache]

    steps:
      - name: Restore Theos cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/theos
          key: ${{ needs.theos-cache.outputs.cache-key }}

      - name: Prepare Theos
        uses: Randomblock1/theos-action@v1

      - name: Build tweak
        shell: bash
        run: |
          set -euo pipefail
          export FINALPACKAGE=1
          make clean package ROOTLESS=1

      - name: Upload built debs
        uses: actions/upload-artifact@v4
        with:
          name: built-debs
          path: packages/*.deb
          if-no-files-found: error
          retention-days: 1