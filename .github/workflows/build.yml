name: Build Tweaks (Helper)

on:
  workflow_call:

jobs:
  build_tweaks:
    name: Build Tweaks
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos
        uses: Randomblock1/theos-action@v1

      - name: Build package
        shell: bash
        run: |
          set -e
          export FINALPACKAGE=1
          make clean package ROOTLESS=1

      - name: Show packages
        shell: bash
        run: ls -lah packages || true

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: build-debs
          path: packages/*.deb
          if-no-files-found: error
          retention-days: 30