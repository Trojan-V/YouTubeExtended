# INPUTS:
# ==================================================================
# None
# ==================================================================

# Produces the following debs:
# ==================================================================
# - youtubeextended.deb (YouTubeExtended tweak)
# The built deb will be stored in the root directory of the runner.
# ==================================================================

# OUTPUTS:
# ==================================================================
# This workflow provides the artifact "youtubeextended" within the current workflow run.
# This artifact can be downloaded by invoking the following action:
# ------------------------------------------------------------------
# - name: Download built YouTubeExtended deb
#   uses: actions/download-artifact@v4
#   with:
#     name: youtubeextended
#     path: ${{ github.workspace }}
# ------------------------------------------------------------------
# ==================================================================

name: Build YouTubeExtended (Reusable Workflow)

on:
  workflow_call:

jobs:
  build:
    name: Build YouTubeExtended Tweak
    runs-on: macos-latest

    steps:
      - name: Setup Theos
        uses: ./.github/actions/setup-theos

      - name: Checkout YouTubeExtended source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

        # =================== BUILD TWEAKS ==================
      - name: Build YouTube Extended Tweak (from source)
        shell: bash
        run: |
          make clean package DEBUG=0 FINALPACKAGE=1
          mv packages/*.deb ./youtubeextended.deb

      - name: Upload YouTubeExtended in the current workflow run
        uses: actions/upload-artifact@v4
        with:
          name: youtubeextended
          path: youtubeextended.deb
          if-no-files-found: error
          retention-days: 1
