name: Create YouTubeExtended App (Manual Workflow)
# This workflow creates an IPA of YouTube with the selected tweaks included.
# It is triggered manually via the "Run workflow" button in the Actions tab of GitHub.
# ======================================================
# Note: The IPA file must be decrypted and accessible via a direct URL for this workflow to work.
# Suggested websites to upload the decrypted IPA:
# - https://catbox.moe/
# ======================================================
# To run this workflow locally, Docker and act can be used:

# How does this workflow work?
# 1. The user triggers the workflow manually and provides the required inputs (IPA URL, tweaks to include, etc.).
# 2. The workflow builds the YouTube

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: "URL to the decrypted IPA file"
        default: ""
        required: true
        type: string

      display_name:
        description: "App Name (Optional)"
        default: "YouTube"
        required: true
        type: string

      bundle_id:
        description: "BundleID (Optional)"
        default: "com.google.ios.youtube"
        required: true
        type: string

      enable_youpip:
        description: "Include YouPIP tweak"
        default: false
        required: true
        type: boolean

      enable_ytuhd:
        description: "Include YouTubeUHD tweak"
        default: false
        required: true
        type: boolean

      enable_yq:
        description: "Include YouQuality tweak"
        default: false
        required: true
        type: boolean

      enable_ryd:
        description: "Include Return-YouTube-Dislikes tweak"
        default: false
        required: true
        type: boolean

      enable_ytabc:
        description: "Include YouTubeABConfig tweak"
        default: false
        required: true
        type: boolean

      enable_demc:
        description: "Include DontEatMyContent tweak"
        default: false
        required: true
        type: boolean

jobs:
  build:
    uses: ./.github/workflows/build.yml

  build-external:
    if: ${{ inputs.enable_youpip || inputs.enable_ytuhd || inputs.enable_yq || inputs.enable_ryd || inputs.enable_ytabc || inputs.enable_demc }}
    uses: ./.github/workflows/build_external.yml
    with:
      enable_youpip: ${{ inputs.enable_youpip }}
      enable_ytuhd: ${{ inputs.enable_ytuhd }}
      enable_yq: ${{ inputs.enable_yq }}
      enable_ryd: ${{ inputs.enable_ryd }}
      enable_ytabc: ${{ inputs.enable_ytabc }}
      enable_demc: ${{ inputs.enable_demc }}

  package:
    name: Package IPA
    runs-on: macos-latest
    needs: [build, build-external]
    if: ${{ always() && needs.build.result == 'success' && (needs.build-external.result == 'success' || needs.build-external.result == 'skipped') }}
    permissions:
      contents: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: .github/actions

      - name: Download debs
        uses: ./.github/actions/download-debs
        with:
          download_external: ${{ inputs.enable_youpip || inputs.enable_ytuhd || inputs.enable_yq || inputs.enable_ryd || inputs.enable_ytabc || inputs.enable_demc }}

      - name: Prepare IPA
        uses: ./.github/actions/prepare-ipa
        with:
          ipa_url: ${{ inputs.ipa_url }}

      - name: Install cyan
        run: pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip

      - name: Inject tweaks into IPA
        run: cyan -i youtube.ipa -o YouTubeExtended.ipa -uwef *.deb *.appex -n "${{ github.event.inputs.display_name }}" -b ${{ github.event.inputs.bundle_id }}

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: youtube-extended-${{ github.run_number }}
          name: YouTubeExtended
          files: YouTubeExtended.ipa
          draft: true

      - name: Output Release URL
        run: echo "::notice::Release available at: https://github.com/${{ github.repository }}/releases"
