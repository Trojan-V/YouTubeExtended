name: Create YouTubeExtended app

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: "URL to the decrypted IPA file"
        default: ""
        required: true
        type: string

      display_name:
        description: "App Name (Optional)"
        default: "YouTube"
        required: true
        type: string

      bundle_id:
        description: "BundleID (Optional)"
        default: "com.google.ios.youtube"
        required: true
        type: string

      tweak_version:
        description: "Tweak version to include (Optional, must be a released version, e.g. 1.0.0)"
        default: "0.0.1"
        required: false
        type: string

jobs:
  build:
    if: ${{ inputs.tweak_version == '' }}
    uses: ./.github/workflows/build.yml

  package:
    name: Package IPA
    runs-on: macos-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download built debs
        if: ${{ inputs.tweak_version == '' }}
        uses: actions/download-artifact@v4
        with:
          name: built-debs
          path: ${{ github.workspace }}

      - name: Download and validate decrypted YouTube IPA
        run: |
          wget "${{ github.event.inputs.ipa_url }}" --no-verbose -O youtube.ipa
          file_type=$(file --mime-type -b youtube.ipa)
          if [[ "$file_type" != "application/x-ios-app" && "$file_type" != "application/zip" ]]; then
            echo "::error::Validation failed: The downloaded file is not a valid IPA. Detected type: $file_type."
            exit 1
          fi

      - name: Download YouTubeExtended (by version)
        if: ${{ inputs.tweak_version != '' }}
        run: |
          deb_url="https://github.com/Trojan-V/YouTubeExtended/releases/download/v${{ inputs.tweak_version }}/com.trojan.youtubeextended_${{ inputs.tweak_version }}_iphoneos-arm64.deb"
          wget "$deb_url" --no-verbose -O youtubeextended.deb

      - name: Install cyan
        run: pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip

      - name: Inject tweaks into IPA
        run: |
          tweaks=""
          for f in *.deb; do
            [ -f "$f" ] && tweaks="$tweaks $f"
          done
          cyan -i youtube.ipa -o YouTubeExtended-${{ needs.build.outputs.tweak-version }}-.ipa -uwef $tweaks -n "${{ github.event.inputs.display_name }}" -b ${{ github.event.inputs.bundle_id }}

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: youtube-extended-${{ github.run_number }}
          name: YouTubeExtended
          files: YouTubeExtended.ipa
          draft: true

      - name: Output Release URL
        run: |
          echo "::notice::Release available at: https://github.com/${{ github.repository }}/releases"