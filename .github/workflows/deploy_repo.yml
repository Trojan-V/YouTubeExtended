name: Deploy AltStore Repo

on:
  push:
    paths:
      - "repo/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # ← das fehlte
    steps:
      - uses: actions/checkout@v4
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          enable_jekyll: false
