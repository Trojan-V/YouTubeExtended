name: (INTERNAL) Create Release

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/build.yml

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download YouTubeExtended deb
        uses: ./.github/actions/download-debs
        with:
          download_external: false

      # Version can be accessed as following:
      # Bare version: steps.version.outputs.version
      # Version as Git Tag: steps.version.outputs.tag
      - name: Get tweak version
        id: version
        uses: ./.github/actions/get-tweak-version

      - name: Create release
        uses: ./.github/actions/tag-and-release
        with:
          tag: ${{ steps.version.outputs.tag }}

